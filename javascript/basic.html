        // task 3
function myFunction(){

    var temp = document.getElementById('marks').value;
    var marks = temp;
    var grade;
    if( marks >= 90){
        grade = "A";
    }
    else if((marks >= 75) & (marks <= 89)){
        grade = "B";
    }
    else if((marks >= 50) & (marks <= 74)){
        grade = "C";
    }    
    else if(marks <= 50) {
        grade = "Fail";
    }
    document.getElementById("grade").innerHTML = grade;

}
</script>





<p>switch case</p>
<input type="number" id="switchid">
<button onclick="myFun()">clickMe</button>
<p id="op"></p>
<script>
    // switch case
function myFun(){
    let sh = 3;
    let in_val = Number(document.getElementById("switchid").value);
    // document.write(typeof(in_val));
   
    temp="";
    switch(in_val){
        case 1 :
                temp="case 1";
                break;
        case 2 :
                temp ="case 2";
                break;
        case 3 :
                temp = "case 3"; 
                break;
        default: 
                temp = "invalid input";                                      
    }

    // document.write(temp);
    document.getElementById("op").innerHTML = temp;
}
 </script>
