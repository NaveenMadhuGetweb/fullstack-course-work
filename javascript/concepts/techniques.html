<body>
    

    <!-- First Prefer -->
    <a href="https://example.com">
      <button>Go</button>
    </a>

    <!-- Redirect Possiblities  -->
    <button onclick="goToPage()">Go</button>
    <button id="btn">Go</button>

<script>

    function goToPage() {
        window.location.href = "https://example.com";       // user go back 
        window.location.replace("https://example.com");     // user can't go back -> useful submit, payment form ...
        window.location.assign("https://example.com");      // similar to href
    }

    // addEventListener (modern approach)
    document.getElementById("btn").addEventListener("click", function() {
        window.location.href = "https://example.com";
    });

</script>
